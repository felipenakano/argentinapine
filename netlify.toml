[build]
  command = "pnpm run build"
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10.4.1"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[plugins]]
  package = "@netlify/plugin-emails"

[forms]
  [forms.contact]
    success_url = "/"

[[notifications.email]]
  event = "submission_created"
  form = "contact"
  to = "ask@argentinapine.com"
  subject = "New inquiry from ArgentinaPine.com"
